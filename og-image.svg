<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060608;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a12;stop-opacity:1" />
    </linearGradient>
    <!-- Blue accent glow -->
    <radialGradient id="glowBlue" cx="50%" cy="60%" r="55%">
      <stop offset="0%" style="stop-color:#49A8FC;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#49A8FC;stop-opacity:0" />
    </radialGradient>
    <!-- Chart line gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#49A8FC;stop-opacity:0.15" />
      <stop offset="50%" style="stop-color:#49A8FC;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#22C55E;stop-opacity:0.7" />
    </linearGradient>
    <!-- Area fill gradient -->
    <linearGradient id="areaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#49A8FC;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#49A8FC;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- BG -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#glowBlue)"/>

  <!-- Dot grid -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.035)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="40%" style="stop-color:transparent;stop-opacity:0" />
    <stop offset="100%" style="stop-color:#000000;stop-opacity:0.65" />
  </radialGradient>
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- Top border accent line -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#lineGrad)" opacity="0.6"/>

  <!-- Chart curve (background decoration) -->
  <!-- Area fill -->
  <path d="M 80 420 C 160 390, 220 430, 300 380 C 380 330, 420 360, 500 300 C 580 240, 620 270, 700 210 C 780 150, 820 180, 900 140 C 960 110, 1000 120, 1080 90 L 1080 500 L 80 500 Z"
        fill="url(#areaGrad)" opacity="0.5"/>
  <!-- Line -->
  <path d="M 80 420 C 160 390, 220 430, 300 380 C 380 330, 420 360, 500 300 C 580 240, 620 270, 700 210 C 780 150, 820 180, 900 140 C 960 110, 1000 120, 1080 90"
        fill="none" stroke="url(#lineGrad)" stroke-width="2.5" opacity="0.7"/>

  <!-- Glowing dot at end of chart -->
  <circle cx="1080" cy="90" r="6" fill="#49A8FC" filter="url(#softglow)" opacity="0.9"/>
  <circle cx="1080" cy="90" r="3" fill="#ffffff" opacity="0.9"/>

  <!-- Left accent bar -->
  <rect x="80" y="160" width="3" height="80" rx="2" fill="#49A8FC" opacity="0.7"/>

  <!-- ZEVEHUB wordmark -->
  <text x="100" y="230" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="72" font-weight="900" letter-spacing="-3"
        fill="white" opacity="0.97">ZEVEHUB</text>

  <!-- Tagline -->
  <text x="102" y="275" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="22" font-weight="400" letter-spacing="0.5"
        fill="rgba(255,255,255,0.5)">Plataforma de performance para day traders</text>

  <!-- Divider -->
  <rect x="100" y="305" width="520" height="1" fill="rgba(255,255,255,0.08)"/>

  <!-- Feature pills -->
  <g transform="translate(100, 330)">
    <!-- Ranking pill -->
    <rect x="0" y="0" width="120" height="34" rx="17" fill="rgba(73,168,252,0.1)" stroke="rgba(73,168,252,0.25)" stroke-width="1"/>
    <text x="60" y="22" font-family="'Inter', Arial, sans-serif" font-size="13" font-weight="600"
          fill="#49A8FC" text-anchor="middle" letter-spacing="0.3">📊 Ranking</text>

    <!-- Metas pill -->
    <rect x="134" y="0" width="104" height="34" rx="17" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.25)" stroke-width="1"/>
    <text x="186" y="22" font-family="'Inter', Arial, sans-serif" font-size="13" font-weight="600"
          fill="#22C55E" text-anchor="middle" letter-spacing="0.3">🎯 Metas</text>

    <!-- Horários pill -->
    <rect x="252" y="0" width="128" height="34" rx="17" fill="rgba(251,191,36,0.1)" stroke="rgba(251,191,36,0.25)" stroke-width="1"/>
    <text x="316" y="22" font-family="'Inter', Arial, sans-serif" font-size="13" font-weight="600"
          fill="#FBBF24" text-anchor="middle" letter-spacing="0.3">⏱ Horários</text>

    <!-- Patentes pill -->
    <rect x="394" y="0" width="120" height="34" rx="17" fill="rgba(239,68,68,0.1)" stroke="rgba(239,68,68,0.25)" stroke-width="1"/>
    <text x="454" y="22" font-family="'Inter', Arial, sans-serif" font-size="13" font-weight="600"
          fill="#EF4444" text-anchor="middle" letter-spacing="0.3">🦈 Patentes</text>
  </g>

  <!-- Stats cards (right side) -->
  <!-- Card 1 -->
  <rect x="760" y="180" width="170" height="90" rx="14"
        fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="775" y="210" font-family="'Inter', Arial, sans-serif" font-size="11" font-weight="500"
        fill="rgba(255,255,255,0.4)" letter-spacing="0.8">P&amp;L TOTAL</text>
  <text x="775" y="247" font-family="'Inter', Arial, sans-serif" font-size="28" font-weight="800"
        fill="#22C55E">+R$12.4k</text>

  <!-- Card 2 -->
  <rect x="950" y="180" width="170" height="90" rx="14"
        fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="965" y="210" font-family="'Inter', Arial, sans-serif" font-size="11" font-weight="500"
        fill="rgba(255,255,255,0.4)" letter-spacing="0.8">WIN RATE</text>
  <text x="965" y="247" font-family="'Inter', Arial, sans-serif" font-size="28" font-weight="800"
        fill="#49A8FC">68.3%</text>

  <!-- Card 3 -->
  <rect x="760" y="290" width="170" height="90" rx="14"
        fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="775" y="320" font-family="'Inter', Arial, sans-serif" font-size="11" font-weight="500"
        fill="rgba(255,255,255,0.4)" letter-spacing="0.8">PATENTE</text>
  <text x="775" y="357" font-family="'Inter', Arial, sans-serif" font-size="26" font-weight="800"
        fill="#EF4444">🦈 Tubarão</text>

  <!-- Card 4 -->
  <rect x="950" y="290" width="170" height="90" rx="14"
        fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="965" y="320" font-family="'Inter', Arial, sans-serif" font-size="11" font-weight="500"
        fill="rgba(255,255,255,0.4)" letter-spacing="0.8">RANKING</text>
  <text x="965" y="357" font-family="'Inter', Arial, sans-serif" font-size="28" font-weight="800"
        fill="#FBBF24">#3 🏆</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.4)"/>
  <text x="100" y="614" font-family="'Inter', Arial, sans-serif" font-size="13" font-weight="500"
        fill="rgba(255,255,255,0.3)">zevehub.vercel.app</text>
  <text x="1100" y="614" font-family="'Inter', Arial, sans-serif" font-size="13" font-weight="500"
        fill="rgba(73,168,252,0.6)" text-anchor="end">Analise. Evolua. Domine.</text>
</svg>
